<!-- window.storage shim backed by localStorage, so the app code (originally written -->
<!-- for the Claude Artifact storage API) works unmodified in a normal browser.       -->
<script>
  (function () {
    function nsKey(key, shared) {
      // "shared" data is stored under its own namespace so it doesn't collide
      // with any future personal-scoped keys of the same name.
      return (shared ? 'shared:' : 'local:') + key;
    }
    window.storage = {
      async get(key, shared) {
        try {
          const raw = localStorage.getItem(nsKey(key, shared));
          if (raw === null) return null;
          return { key, value: raw, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
      async set(key, value, shared) {
        try {
          localStorage.setItem(nsKey(key, shared), value);
          return { key, value, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
      async delete(key, shared) {
        try {
          localStorage.removeItem(nsKey(key, shared));
          return { key, deleted: true, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
      async list(prefix, shared) {
        try {
          const p = (shared ? 'shared:' : 'local:') + (prefix || '');
          const keys = [];
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i);
            if (k && k.startsWith(p)) keys.push(k.slice(shared ? 7 : 6));
          }
          return { keys, prefix, shared: !!shared };
        } catch (e) {
          return null;
        }
      },
    };
  })();
</script>

<!-- Import map: load React / ReactDOM / lucide-react as plain ES modules from a CDN,  -->
<!-- no build step required. -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
  }
}
</script>

<!-- Babel Standalone: transforms the JSX in app.js in the browser -->

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {

        });
      });
    }
  </script>
